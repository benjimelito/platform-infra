name: Provision Lovable App (prod)

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Target repo in owner/name format (e.g. benjimelito/angular-demo)"
        required: true
        type: string
      app_slug:
        description: "Optional. Defaults to repo name normalized (lowercase, - -> _)"
        required: false
        type: string

jobs:
  provision:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::715896377670:role/github-actions-eb
          aws-region: us-east-1

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Derive app_slug and EB env name
        shell: bash
        run: |
          set -euo pipefail
          TARGET_REPO="${{ inputs.target_repo }}"
          REPO_NAME="${TARGET_REPO#*/}"

          if [ -n "${{ inputs.app_slug }}" ]; then
            APP_SLUG="${{ inputs.app_slug }}"
          else
            APP_SLUG="$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]' | tr '-' '_')"
          fi

          EB_ENV_NAME="${APP_SLUG}-prod"

          echo "TARGET_REPO=$TARGET_REPO" >> "$GITHUB_ENV"
          echo "APP_SLUG=$APP_SLUG" >> "$GITHUB_ENV"
          echo "EB_ENV_NAME=$EB_ENV_NAME" >> "$GITHUB_ENV"

      - name: Find EB EC2 instance id
        shell: bash
        run: |
          set -euo pipefail
          ENV_RES_JSON="$(aws elasticbeanstalk describe-environment-resources --environment-name "${EB_ENV_NAME}")"
          INSTANCE_ID="$(echo "$ENV_RES_JSON" | jq -r '.EnvironmentResources.Instances[0].Id // empty')"
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "null" ]; then
            echo "ERROR: Could not find an EC2 instance for EB env: ${EB_ENV_NAME}"
            exit 1
          fi
          echo "INSTANCE_ID=$INSTANCE_ID" >> "$GITHUB_ENV"

      - name: Provision DB via SSM (script)
        shell: bash
        env:
          INSTANCE_ID: ${{ env.INSTANCE_ID }}
          APP_SLUG: ${{ env.APP_SLUG }}
          RDS_HOST: ${{ secrets.RDS_HOST }}
          RDS_ADMIN_USER: ${{ secrets.RDS_ADMIN_USER }}
          RDS_ADMIN_PASSWORD: ${{ secrets.RDS_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x ./scripts/provision_db_via_ssm.sh
          DATABASE_URL="$(./scripts/provision_db_via_ssm.sh)"
          echo "::add-mask::${DATABASE_URL}"
          echo "DATABASE_URL=${DATABASE_URL}" >> "$GITHUB_ENV"

      - name: Write DATABASE_URL secret to target repo (gh cli)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN}" ]; then
            echo "ERROR: Missing GH_ADMIN_TOKEN secret in platform-infra repo."
            exit 1
          fi

          # Writes/updates the secret in the target repo.
          echo -n "${DATABASE_URL}" | gh secret set DATABASE_URL -R "${TARGET_REPO}" -b -