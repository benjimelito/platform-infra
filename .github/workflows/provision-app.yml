name: Provision Lovable App (prod)

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repo in owner/name format (e.g. benjimelito/lovable-foo)'
        required: true
        type: string
      app_slug:
        description: 'Optional. Defaults to repo name normalized (lowercase, - -> _)'
        required: false
        type: string

jobs:
  provision:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::715896377670:role/github-actions-eb
          aws-region: us-east-1

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Derive app_slug and env name
        id: derive
        run: |
          set -euo pipefail

          TARGET_REPO="${{ inputs.target_repo }}"
          REPO_NAME="${TARGET_REPO#*/}"

          if [ -n "${{ inputs.app_slug }}" ]; then
            APP_SLUG="${{ inputs.app_slug }}"
          else
            # normalize: lowercase and replace '-' with '_'
            APP_SLUG="$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]' | tr '-' '_')"
          fi

          EB_ENV_NAME="${APP_SLUG}-prod"

          echo "TARGET_REPO=$TARGET_REPO" >> $GITHUB_ENV
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "APP_SLUG=$APP_SLUG" >> $GITHUB_ENV
          echo "EB_ENV_NAME=$EB_ENV_NAME" >> $GITHUB_ENV

          echo "app_slug=$APP_SLUG" >> $GITHUB_OUTPUT
          echo "eb_env_name=$EB_ENV_NAME" >> $GITHUB_OUTPUT

      - name: Find EB environment and its EC2 instance id
        id: eb
        run: |
          set -euo pipefail

          # Find environment resources (includes instance IDs)
          ENV_RES_JSON="$(aws elasticbeanstalk describe-environment-resources \
            --environment-name "${EB_ENV_NAME}")"

          INSTANCE_ID="$(echo "$ENV_RES_JSON" | jq -r '.EnvironmentResources.Instances[0].Id // empty')"

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "null" ]; then
            echo "ERROR: Could not find an EC2 instance for EB env: ${EB_ENV_NAME}"
            echo "Make sure the EB environment exists and has at least 1 instance."
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      - name: Run DB provisioning via SSM on the EB instance
        id: ssm
        env:
          RDS_HOST: ${{ secrets.RDS_HOST }}
          RDS_ADMIN_USER: ${{ secrets.RDS_ADMIN_USER }}
          RDS_ADMIN_PASSWORD: ${{ secrets.RDS_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${RDS_HOST}" ] || [ -z "${RDS_ADMIN_USER}" ] || [ -z "${RDS_ADMIN_PASSWORD}" ]; then
            echo "ERROR: Missing required secrets in platform-infra repo:"
            echo "  - RDS_HOST"
            echo "  - RDS_ADMIN_USER"
            echo "  - RDS_ADMIN_PASSWORD"
            exit 1
          fi

          DB_NAME="${APP_SLUG}"
          DB_USER="${APP_SLUG}_app"

          # generate a reasonably strong password (32 chars, URL-safe-ish)
          DB_PASS="$(openssl rand -base64 48 | tr -d '\n' | tr '+/' '-_' | cut -c1-32)"

          # We'll run psql on the EB instance. We assume psql is available or can be installed.
          # The command:
          # 1) installs postgresql client if needed
          # 2) creates db if not exists
          # 3) creates user if not exists (or resets password)
          # 4) grants privileges
          REMOTE_CMD=$(cat <<'EOF'
set -euo pipefail

# Install psql client if missing
if ! command -v psql >/dev/null 2>&1; then
  sudo yum -y install postgresql15 || sudo yum -y install postgresql || true
fi

export PGPASSWORD="${RDS_ADMIN_PASSWORD}"

# Create DB if it doesn't exist
psql -h "${RDS_HOST}" -U "${RDS_ADMIN_USER}" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='${DB_NAME}'" | grep -q 1 \
  || psql -h "${RDS_HOST}" -U "${RDS_ADMIN_USER}" -d postgres -c "CREATE DATABASE \"${DB_NAME}\";"

# Create role if it doesn't exist; set/reset password
psql -h "${RDS_HOST}" -U "${RDS_ADMIN_USER}" -d postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='${DB_USER}'" | grep -q 1 \
  || psql -h "${RDS_HOST}" -U "${RDS_ADMIN_USER}" -d postgres -c "CREATE USER \"${DB_USER}\";"

psql -h "${RDS_HOST}" -U "${RDS_ADMIN_USER}" -d postgres -c "ALTER USER \"${DB_USER}\" WITH PASSWORD '${DB_PASS}';"

# Grant privileges on the database
psql -h "${RDS_HOST}" -U "${RDS_ADMIN_USER}" -d postgres -c "GRANT ALL PRIVILEGES ON DATABASE \"${DB_NAME}\" TO \"${DB_USER}\";"

# Allow the user to create objects in public schema (typical app behavior)
export PGPASSWORD="${DB_PASS}"
psql -h "${RDS_HOST}" -U "${DB_USER}" -d "${DB_NAME}" -c "GRANT USAGE, CREATE ON SCHEMA public TO \"${DB_USER}\";"
EOF
)

          # Send SSM command
          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Provision DB/user for ${APP_SLUG}" \
            --parameters commands="$(jq -Rsa . <<<"${REMOTE_CMD}")" \
            --query "Command.CommandId" \
            --output text)"

          echo "SSM CommandId: ${COMMAND_ID}"

          # Wait for completion
          aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}"

          # Fetch output
          INVOCATION="$(aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}")"

          STATUS="$(echo "$INVOCATION" | jq -r '.Status')"
          if [ "$STATUS" != "Success" ]; then
            echo "ERROR: SSM command failed with status: $STATUS"
            echo "---- STDOUT ----"
            echo "$INVOCATION" | jq -r '.StandardOutputContent'
            echo "---- STDERR ----"
            echo "$INVOCATION" | jq -r '.StandardErrorContent'
            exit 1
          fi

          # Create DATABASE_URL for Prisma. (public schema by default)
          DATABASE_URL="postgresql://${DB_USER}:${DB_PASS}@${RDS_HOST}:5432/${DB_NAME}?schema=public"

          # Mask secrets in logs
          echo "::add-mask::${DB_PASS}"
          echo "::add-mask::${DATABASE_URL}"

          echo "database_url=${DATABASE_URL}" >> $GITHUB_OUTPUT

      - name: Write DATABASE_URL secret to target repo (GitHub API)
        env:
          GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GH_ADMIN_TOKEN}" ]; then
            echo "ERROR: Missing GH_ADMIN_TOKEN secret in platform-infra repo."
            exit 1
          fi

          DATABASE_URL="${{ steps.ssm.outputs.database_url }}"

          OWNER="${TARGET_REPO%/*}"
          REPO="${TARGET_REPO#*/}"

          # Get repo public key for secrets encryption
          KEY_JSON="$(curl -sS -H "Authorization: Bearer ${GH_ADMIN_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}/actions/secrets/public-key")"

          KEY_ID="$(echo "$KEY_JSON" | jq -r .key_id)"
          PUBLIC_KEY="$(echo "$KEY_JSON" | jq -r .key)"

          if [ -z "$KEY_ID" ] || [ "$KEY_ID" = "null" ]; then
            echo "ERROR: Could not fetch public key for repo secrets. Check GH_ADMIN_TOKEN permissions."
            echo "$KEY_JSON"
            exit 1
          fi

          # Encrypt using libsodium via Python (available on ubuntu runners)
          python3 - <<'PY'
import base64, os, sys
from nacl import encoding, public

public_key_b64 = os.environ["PUBLIC_KEY"]
secret_value = os.environ["SECRET_VALUE"].encode("utf-8")

pk = public.PublicKey(public_key_b64, encoding.Base64Encoder())
sealed_box = public.SealedBox(pk)
encrypted = sealed_box.encrypt(secret_value)
print(base64.b64encode(encrypted).decode("utf-8"))
PY
        env:
          PUBLIC_KEY: ${{ env.PUBLIC_KEY }}
          SECRET_VALUE: ${{ steps.ssm.outputs.database_url }}
        shell: bash

      - name: (Placeholder) Confirm Step 1 complete
        run: |
          echo "Step 1 file added. Next step will be to add required secrets in platform-infra repo."
